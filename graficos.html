<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráficos | LexIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .table-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo" style="font-size: 2rem; text-align: center; letter-spacing: 2px;">🤖💼</div>
            <div class="sidebar-nav">
                <a href="painel.html">Painel Geral</a>
                <a href="novo_processo.html">Novo Processo</a>
                <a href="graficos.html" class="active">Gráficos</a>
                <a href="historico.html">Histórico</a>
            </div>
            <div class="sidebar-footer">
                <a href="index.html">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Sair do sistema
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem; font-family: var(--font-sans);">Relatórios e Gráficos</h1>
            <p style="margin-bottom: 2.5rem; color: var(--text-muted);">Visão gerencial e métricas de todos os processos do sistema.</p>

            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem;">
                <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div class="stat-card" style="background: var(--card-bg); box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                        <div class="stat-card-header">
                            <div style="color: #fff; font-size: 1.5rem; background: #3b82f6; padding: 0.6rem; border-radius: 10px;">📄</div>
                            <div class="stat-value" id="graficoTotal">0</div>
                        </div>
                        <div class="stat-label">Total de Processos Analisados</div>
                    </div>
                    <div class="stat-card" style="background: var(--card-bg); box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                        <div class="stat-card-header">
                            <div style="color: #fff; font-size: 1.5rem; background: #ef4444; padding: 0.6rem; border-radius: 10px;">⚠️</div>
                            <div class="stat-value" id="graficoCritico">0</div>
                        </div>
                        <div class="stat-label">Riscos Críticos Detectados</div>
                    </div>
                </div>

                <div class="table-card" style="display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
                    <h3 style="font-size: 1.1rem; margin-bottom: 2rem; font-family: var(--font-sans); width: 100%; text-align: left; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">Distribuição Geral de Riscos</h3>
                    <div style="width: 100%; max-width: 400px; height: 300px;">
                        <canvas id="riscosChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
