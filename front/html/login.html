<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EstratégIA Jus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <a href="index.html" class="circle-back-btn" title="Voltar para o início">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </a>
    <div class="landing-container">
        <div class="auth-container">
            <div class="card" style="padding: 3rem 2.5rem;">
                <h2 style="font-size: 1.6rem; text-align: center; margin-bottom: 0.5rem; font-family: var(--font-sans);">Bem-vindo de volta</h2>
                <p style="text-align: center; margin-bottom: 2rem; font-size: 0.95rem;">Acesse sua conta para continuar</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="loginEmail" class="form-control" placeholder="advogado@escritorio.com" required>
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="loginSenha" class="form-control" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn-primary btn-block" style="margin-top: 1.5rem; padding: 0.8rem;">Entrar no Sistema</button>
                </form>

                <p style="text-align: center; margin-top: 2rem; margin-bottom: 0; font-size: 0.85rem;">
                    Não tem uma conta? <a href="cadastro.html" style="color: var(--accent-gold); text-decoration: none; font-weight: 600;">Cadastre-se</a>
                </p>
            </div>
        </div>
    </div>
    <script src="../js/app.js"></script>
</body>
</html>
