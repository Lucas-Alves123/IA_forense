<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico | LexIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }
        th { font-weight: 600; color: var(--text-main); background-color: rgba(15, 23, 42, 0.5); }
        td { color: var(--text-muted); }
        .status { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .status.done { background-color: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid #10b981; }
        tr:hover { background-color: rgba(203, 161, 83, 0.02); }
    </style>
</head>
<body>
    <div class="app-container">
        
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo" style="text-align: center;">
                <img src="../img/logo.png" alt="LexIA Logo" style="max-width: 90px; height: auto;">
            </div>
            <div class="sidebar-nav">
                <a href="painel.html">Painel Geral</a>
                <a href="novo_processo.html">Novo Processo</a>
                <a href="historico.html" class="active">Histórico</a>
            </div>
            <div class="sidebar-footer">
                <a href="index.html">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Sair do sistema
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Histórico de Análises</h1>
            <p style="margin-bottom: 2.5rem;">Consulte os relatórios estratégicos já gerados pelo sistema.</p>

            <div class="card" style="padding: 1.5rem;">
                <div style="margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border-color); display: flex; gap: 1.5rem; align-items: flex-end; flex-wrap: wrap;">
                    <div style="flex: 2; min-width: 200px;">
                        <label style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.3rem; display: block;">Processo ou Cliente</label>
                        <input type="text" id="filtroTexto" class="form-control" placeholder="Digite para buscar..." style="margin-bottom: 0; padding: 0.6rem 1rem;">
                    </div>
                    <div style="flex: 1; min-width: 150px;">
                        <label style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.3rem; display: block;">Risco Geral</label>
                        <select id="filtroRisco" class="form-control" style="margin-bottom: 0; padding: 0.6rem 1rem;">
                            <option value="">Todos os riscos</option>
                            <option value="Baixo">Baixo</option>
                            <option value="Moderado">Moderado</option>
                            <option value="Crítico">Crítico</option>
                        </select>
                    </div>
                    <div style="flex: 1; min-width: 150px;">
                        <label style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.3rem; display: block;">Data</label>
                        <input type="date" id="filtroData" class="form-control" style="margin-bottom: 0; padding: 0.6rem 1rem;">
                    </div>
                    <div>
                        <button id="limparFiltros" class="btn-secondary" style="padding: 0.6rem 1rem;">Limpar</button>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Processo / Cliente</th>
                            <th>Fase</th>
                            <th>Risco Geral</th>
                            <th>Data</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaHistoricoBody">
                        <!-- JS vai injetar os processos aqui -->
                    </tbody>
                </table>
                <div id="paginacaoHistorico" style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                    <!-- JS vai injetar os botoes aqui -->
                </div>
            </div>
        </div>
    </div>
    <script src="../js/app.js"></script>
</body>
</html>
